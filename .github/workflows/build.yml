name: CI

on: [push, pull_request]

jobs:
  
  build_ps4:
    runs-on: windows-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          lfs: 'true'
      - name: checkoutLFS
        uses: actions/checkout@v4
      - run: git lfs pull
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build Files
        run: |
          ./_build.bat
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: RB4DX-PS4
          path: _build
